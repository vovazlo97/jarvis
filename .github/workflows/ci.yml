name: CI

on:
  push:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install system audio dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev
      - uses: Swatinem/rust-cache@v2
      # Lint only core + cli on Linux (jarvis-app and jarvis-gui require native audio/Tauri deps)
      - name: Run clippy
        run: cargo clippy -p jarvis-core -p jarvis-cli --no-default-features -- -D warnings

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system audio dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev
      - uses: Swatinem/rust-cache@v2
      # jarvis-app and jarvis-gui excluded — require Windows-only DLLs (libvosk.dll, etc.)
      - name: Run tests (core + cli, no native audio features)
        run: cargo test -p jarvis-core -p jarvis-cli --no-default-features

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Run full workspace tests
        run: cargo test --workspace
