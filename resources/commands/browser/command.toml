# Все браузерные команды запускают Chrome напрямую.
# Если Chrome не по стандартному пути — измени exe_path ниже.
# exe_args — аргументы, которые передаются Chrome (URL или пусто).

# ── Открыть браузер (без сайта) ───────────────────────────────────────────────
[[commands]]
id = "browser_open"
type = "exe"
exe_path = "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
exe_args = []
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]
sounds.en = ["ok1", "ok2", "ok3"]
sounds.ua = ["ok1", "ok2", "ok3", "ok4", "ok5", "ok6"]
phrases.ru = ["открой браузер", "запусти браузер", "нужен браузер", "включи браузер"]
phrases.en = ["open browser", "launch browser", "start browser", "i need browser"]
phrases.ua = ["відкрий браузер", "запусти браузер", "увімкни браузер", "потрібен браузер"]


# ── YouTube ───────────────────────────────────────────────────────────────────
[[commands]]
id = "open_youtube"
type = "exe"
exe_path = "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
exe_args = ["https://youtube.com"]
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]
sounds.en = ["ok1", "ok2", "ok3"]
sounds.ua = ["ok1", "ok2", "ok3", "ok4", "ok5", "ok6"]
phrases.ru = ["открой ютуб", "запусти ютуб", "включи ютуб", "зайди на ютуб", "ютуб"]
phrases.en = ["open youtube", "launch youtube", "go to youtube", "youtube"]
phrases.ua = ["відкрий ютуб", "запусти ютуб", "зайди на ютуб", "ютуб"]
patterns = ["ютуб[а-яё]*|youtube"]


