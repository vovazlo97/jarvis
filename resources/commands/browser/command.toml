# ── Закрыть браузер ───────────────────────────────────────────────────────────
[[commands]]
id = "browser_close"
type = "cli"
cli_cmd = "powershell"
cli_args = ["-Command", "Get-Process chrome,msedge,firefox -ErrorAction SilentlyContinue | Stop-Process -Force"]
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]
sounds.en = ["ok1", "ok2", "ok3"]
sounds.ua = ["ok1", "ok2", "ok3", "ok4", "ok5", "ok6"]
phrases.ru = ["закрой браузер", "закрой все браузеры", "выключи браузер", "убери браузер"]
phrases.en = ["close browser", "close all browsers", "shut down browser"]
phrases.ua = ["закрий браузер", "закрий всі браузери", "вимкни браузер"]
patterns = ["закрой\\s+браузер|закрий\\s+браузер"]
