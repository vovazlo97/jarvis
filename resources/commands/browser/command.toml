# ── GitHub ────────────────────────────────────────────────────────────────────
[[commands]]
id = "open_github"
type = "exe"
exe_path = "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
exe_args = ["https://github.com"]
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]
sounds.en = ["ok1", "ok2", "ok3"]
sounds.ua = ["ok1", "ok2", "ok3", "ok4", "ok5", "ok6"]
